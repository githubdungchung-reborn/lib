name: Test

on:
  workflow_dispatch:
  schedule:
    # Runs at 8 AM, 2 PM, and 8 PM UTC daily (adjust timing as needed)
    - cron: '0 8,14,20 * * *'

jobs:
  increase-downloads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm-increaser-downloads
        run: npm install -g npm-increaser-downloads

      - name: Run Increase Downloads
        run: |
          # Generate random downloads per package to reach 1M+ monthly
          # Target: ~1M/month = ~11,111/run (3 runs/day × 30 days = 90 runs/month)
          # Range: 10,000–13,999 per run → avg ~12,000 × 90 ≈ 1,080,000/month per package
          DOWNLOADS_1=$((10000 + RANDOM % 4000))
          DOWNLOADS_2=$((10000 + RANDOM % 4000))
          DOWNLOADS_3=$((10000 + RANDOM % 4000))

          echo "Downloads this run: react-theme-switch-animation=$DOWNLOADS_1, react-native-converted-in-sdk=$DOWNLOADS_2, npm-increaser-downloads=$DOWNLOADS_3"

          # Run commands for different packages with independent random download counts
          nid --package-name react-theme-switch-animation --num-downloads $DOWNLOADS_1 --max-concurrent-downloads 500 --download-timeout 5000
          nid --package-name react-native-converted-in-sdk --num-downloads $DOWNLOADS_2 --max-concurrent-downloads 500 --download-timeout 5000
          nid --package-name npm-increaser-downloads --num-downloads $DOWNLOADS_3 --max-concurrent-downloads 500 --download-timeout 5000
